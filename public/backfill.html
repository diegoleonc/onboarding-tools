<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIIO → Asana Backfill</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 24px; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    .subtitle { color: #94a3b8; margin-bottom: 24px; }
    .controls { display: flex; gap: 12px; margin-bottom: 24px; align-items: center; flex-wrap: wrap; }
    button { padding: 10px 20px; border: none; border-radius: 8px; font-size: 0.9rem; cursor: pointer; font-weight: 600; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-dry { background: #3b82f6; color: white; }
    .btn-run { background: #ef4444; color: white; }
    .btn-stop { background: #6b7280; color: white; }
    .file-input { background: #1e293b; border: 2px dashed #334155; border-radius: 8px; padding: 16px; cursor: pointer; }
    .file-input:hover { border-color: #3b82f6; }
    input[type="file"] { display: none; }
    .stats { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat { background: #1e293b; border-radius: 8px; padding: 12px 16px; min-width: 120px; }
    .stat .label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; }
    .stat .value { font-size: 1.5rem; font-weight: 700; margin-top: 4px; }
    .stat .value.green { color: #22c55e; }
    .stat .value.yellow { color: #eab308; }
    .stat .value.red { color: #ef4444; }
    .stat .value.blue { color: #3b82f6; }
    .progress-bar { background: #1e293b; border-radius: 8px; height: 8px; margin-bottom: 24px; overflow: hidden; }
    .progress-fill { height: 100%; background: #3b82f6; transition: width 0.3s; border-radius: 8px; }
    .log { background: #1e293b; border-radius: 8px; padding: 16px; max-height: 60vh; overflow-y: auto; font-family: 'SF Mono', monospace; font-size: 0.8rem; line-height: 1.6; }
    .log-entry { padding: 4px 0; border-bottom: 1px solid #1e293b22; }
    .log-entry.created { color: #22c55e; }
    .log-entry.skipped { color: #eab308; }
    .log-entry.error { color: #ef4444; }
    .log-entry.dry_run { color: #3b82f6; }
    .log-entry .idx { color: #64748b; margin-right: 8px; }
  </style>
</head>
<body>
  <h1>DIIO → Asana Backfill</h1>
  <p class="subtitle">Procesa reuniones históricas de DIIO y crea status updates en Asana</p>

  <div class="controls">
    <label class="file-input" id="fileLabel">
      📁 Cargar JSON de DIIO
      <input type="file" id="fileInput" accept=".json" />
    </label>
    <button class="btn-dry" id="btnDry" disabled>🔍 Dry Run (preview)</button>
    <button class="btn-run" id="btnRun" disabled>🚀 Ejecutar Backfill</button>
    <button class="btn-stop" id="btnStop" disabled>⏹ Detener</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="label">Total</div><div class="value" id="statTotal">0</div></div>
    <div class="stat"><div class="label">Procesadas</div><div class="value blue" id="statProcessed">0</div></div>
    <div class="stat"><div class="label">Creadas</div><div class="value green" id="statCreated">0</div></div>
    <div class="stat"><div class="label">Skipped</div><div class="value yellow" id="statSkipped">0</div></div>
    <div class="stat"><div class="label">Errores</div><div class="value red" id="statErrors">0</div></div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 0%"></div></div>

  <div class="log" id="log"></div>

  <script>
    let meetings = [];
    let running = false;
    let aborted = false;

    const fileInput = document.getElementById('fileInput');
    const fileLabel = document.getElementById('fileLabel');
    const btnDry = document.getElementById('btnDry');
    const btnRun = document.getElementById('btnRun');
    const btnStop = document.getElementById('btnStop');
    const log = document.getElementById('log');
    const statTotal = document.getElementById('statTotal');
    const statProcessed = document.getElementById('statProcessed');
    const statCreated = document.getElementById('statCreated');
    const statSkipped = document.getElementById('statSkipped');
    const statErrors = document.getElementById('statErrors');
    const progressFill = document.getElementById('progressFill');

    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const text = await file.text();
      const data = JSON.parse(text);
      meetings = data.Reuniones || data.reuniones || data;
      if (!Array.isArray(meetings)) meetings = [meetings];

      // Sort oldest first (backfill chronologically)
      meetings.sort((a, b) => {
        const da = new Date(a['Fecha de agendado'] || 0);
        const db = new Date(b['Fecha de agendado'] || 0);
        return da - db;
      });

      fileLabel.textContent = `✅ ${meetings.length} reuniones cargadas (${file.name})`;
      statTotal.textContent = meetings.length;
      btnDry.disabled = false;
      btnRun.disabled = false;
      addLog('info', `Cargadas ${meetings.length} reuniones, ordenadas de más antigua a más reciente`);
    });

    btnDry.addEventListener('click', () => runBackfill(true));
    btnRun.addEventListener('click', () => {
      if (confirm('¿Estás seguro? Esto creará status updates reales en Asana.')) {
        runBackfill(false);
      }
    });
    btnStop.addEventListener('click', () => { aborted = true; });

    async function runBackfill(dryRun) {
      if (running) return;
      running = true;
      aborted = false;
      btnDry.disabled = true;
      btnRun.disabled = true;
      btnStop.disabled = false;
      log.innerHTML = '';

      let processed = 0, created = 0, skipped = 0, errors = 0;

      addLog('info', `${dryRun ? '🔍 DRY RUN' : '🚀 EJECUTANDO'} — procesando ${meetings.length} reuniones...`);

      for (let i = 0; i < meetings.length; i++) {
        if (aborted) {
          addLog('info', '⏹ Detenido por el usuario');
          break;
        }

        const m = meetings[i];
        const name = m['Nombre'] || 'Sin nombre';
        const date = (m['Fecha de agendado'] || '').substring(0, 10);

        try {
          const resp = await fetch('/api/backfill', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ meeting: m, dryRun }),
          });

          const result = await resp.json();
          processed++;

          if (result.status === 'created' || result.status === 'dry_run') {
            if (result.wouldCreate || result.status === 'created') {
              created++;
              const label = dryRun ? 'CREARÍA' : 'CREADO';
              addLog(result.status, `${i + 1}. [${label}] ${date} | ${name} → ${result.projectName} (${result.statusType})`);
            } else {
              skipped++;
              addLog('skipped', `${i + 1}. [SKIP] ${date} | ${name} — ${result.reason || 'no match'}`);
            }
          } else if (result.status === 'skipped') {
            skipped++;
            addLog('skipped', `${i + 1}. [SKIP] ${date} | ${name} — ${result.reason}`);
          } else if (result.status === 'error') {
            errors++;
            addLog('error', `${i + 1}. [ERROR] ${date} | ${name} — ${result.reason}`);
          }
        } catch (err) {
          processed++;
          errors++;
          addLog('error', `${i + 1}. [ERROR] ${date} | ${name} — ${err.message}`);
        }

        // Update stats
        statProcessed.textContent = processed;
        statCreated.textContent = created;
        statSkipped.textContent = skipped;
        statErrors.textContent = errors;
        progressFill.style.width = `${((i + 1) / meetings.length) * 100}%`;

        // Small delay to avoid rate limits
        if (!dryRun) await sleep(500);
        else await sleep(200);
      }

      addLog('info', `\n✅ Completado: ${created} ${dryRun ? 'se crearían' : 'creadas'}, ${skipped} saltadas, ${errors} errores`);
      running = false;
      btnDry.disabled = false;
      btnRun.disabled = false;
      btnStop.disabled = true;
    }

    function addLog(type, message) {
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = message;
      log.appendChild(entry);
      log.scrollTop = log.scrollHeight;
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
  </script>
</body>
</html>
